# deps.lock — pinned external dependency versions for the cross-build.
#
# Format: one dep per line:  <name> <version> <url> <sha256>
# The sha256 is verified after download (recipes/common.sh: fetch_verify).
# Bump a version here + update its sha256; both maintainers re-run provision.sh
# and get byte-comparable sysroots. This file IS the coordination point.
#
# sha256 values below are placeholders (PIN_ME) — fill them on first fetch with
#   ./scripts/pin-hashes.sh   (prints the real sha256 for each URL)
# until then recipes/common.sh warns rather than hard-fails, so a first run works.

zlib     1.3.1    https://zlib.net/fossils/zlib-1.3.1.tar.gz                                                PIN_ME
pcre2    10.44    https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.44/pcre2-10.44.tar.gz   PIN_ME
nghttp2  1.64.0   https://github.com/nghttp2/nghttp2/releases/download/v1.64.0/nghttp2-1.64.0.tar.gz       PIN_ME
openssl  3.3.2    https://github.com/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz  PIN_ME

# Toolchain (fetched by scripts/get-zig.sh; kept here so the version is pinned
# in one place). Update ZIG_* together.
zig      0.13.0   https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz                       PIN_ME

# FreeBSD base sysroot (fetched by scripts/fetch-freebsd-base.sh). One entry per
# CPU; the script picks by arch. BSD-licensed, freely redistributable.
freebsd-base-x86_64   14.1  https://download.freebsd.org/releases/amd64/14.1-RELEASE/base.txz    PIN_ME
freebsd-base-aarch64  14.1  https://download.freebsd.org/releases/arm64/aarch64/14.1-RELEASE/base.txz  PIN_ME
