# deps.lock — pinned external dependency versions for the cross-build.
#
# Format: one dep per line:  <name> <version> <url> <sha256>
# The sha256 is verified after download (recipes/common.sh: fetch_verify).
# Bump a version here + update its sha256; both maintainers re-run provision.sh
# and get byte-comparable sysroots. This file IS the coordination point.
#
# sha256 values are pinned. After bumping a version (or a URL), set that entry's
# sha back to PIN_ME and re-run ./scripts/pin-hashes.sh --rewrite to re-pin. A
# PIN_ME entry warns rather than hard-fails, so a first run still works.

zlib                   1.3.1    https://zlib.net/fossils/zlib-1.3.1.tar.gz  9a93b2b7dfdac77ceba5a558a580e74667dd6fede4585b91eefb60f03b72df23
pcre2                  10.44    https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.44/pcre2-10.44.tar.gz  86b9cb0aa3bcb7994faa88018292bc704cdbb708e785f7c74352ff6ea7d3175b
nghttp2                1.64.0   https://github.com/nghttp2/nghttp2/releases/download/v1.64.0/nghttp2-1.64.0.tar.gz  20e73f3cf9db3f05988996ac8b3a99ed529f4565ca91a49eb0550498e10621e8
openssl                3.3.2    https://github.com/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz  2e8a40b01979afe8be0bbfb3de5dc1c6709fedb46d6c89c10da114ab5fc3d281
# sqlite — opt-in (NOT in CB_LIBS default): the one common Tier-3 contrib dep,
# for cross-shipping contrib.sqlite apps (LisMusic). Autoconf amalgamation
# tarball = a single sqlite3.c + sqlite3.h, so recipes/sqlite.sh needs no
# ./configure — just `zig cc -c` + ar. Enable with CB_LIBS="... sqlite".
sqlite                 3.47.0   https://www.sqlite.org/2024/sqlite-autoconf-3470000.tar.gz  83eb21a6f6a649f506df8bd3aab85a08f7556ceed5dbd8dea743ea003fc3a957
# lua / duktape — opt-in HEADER-ONLY deps for the dlopen host bridges
# (contrib/host/lua, contrib/host/duktape). The bridge dlopen's the runtime lib
# at RUNTIME but #includes the language headers at COMPILE time, so the recipe
# only stages headers into the sysroot (no cross-built .a). Enable per-need with
# CB_LIBS="... lua" / "... duktape".
lua                    5.4.7    https://www.lua.org/ftp/lua-5.4.7.tar.gz  9fbf5e28ef86c69858f6d3d34eccc32e911c1a28b4120ff3e84aaa70cfbf1e30
duktape                2.7.0    https://duktape.org/duktape-2.7.0.tar.xz  90f8d2fa8b5567c6899830ddef2c03f3c27960b11aca222fa17aa7ac613c2890

